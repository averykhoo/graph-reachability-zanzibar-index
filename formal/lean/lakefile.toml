name = "ZanzibarProofs"
defaultTargets = ["ZanzibarProofs"]

# Mathlib pinned to the release tag matching the Lean toolchain (v4.31.0).
# Build against the prebuilt cache: `lake exe cache get` before `lake build`.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "ZanzibarProofs"

# Conformance CLI: executable spec oracle for the Python harness (SEMANTICS.md §10).
[[lean_exe]]
name = "zcli"
root = "ZanzibarProofs.Cli"
